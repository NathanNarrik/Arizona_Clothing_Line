<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Check Clothes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background-color: #f2f2f2;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 48px;
            color: #4CAF50;
            margin: 0;
        }
        .form-container {
            background-color: #f2f2f2;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 24px;
            color: #4CAF50;
            margin-bottom: 10px;
        }
        input[type="number"], input[type="password"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            margin-top: 6px;
            margin-bottom: 16px;
            resize: vertical;
        }
        button[type="submit"] {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 24px;
        }
        button[type="submit"]:hover {
            background-color: #3e8e41;
        }
        img {
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="{{ url_for('static', filename='img/leaf.png') }}" alt="Leaf icon">
            <h1>Check In Clothes</h1>
        </div>
        <div class="form-container">
            <form action="/check" method="POST">
                <div class="form-group">
                    <label for="clothes">How many clothes are you drying?</label>
                    <input type="number" id="clothes" name="clothes" required>
                </div>
                <div class="form-group">
                    <label for="hanging">Are you actually hanging all these clothes?</label>
                    <select id="hanging" name="hanging" required>
                        <option value="">Select an option</option>
                        <option value="yes">Yes</option>
                        <option value="no">No</option>
                    </select>
                </div> 
                <input type="hidden" id="username" name="username" value={{user.get_username()}}>                                             
                <div class="form-group">
                    <button type="submit">Check</button>
                </div>
            </form>
        </div>
    </div>
</body>
